<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Concourse — calibration check</title>
  <style>
    :root {
      --ink: #0f1d3a; --muted: #5a6b8a; --accent: #1e63d6;
      --bg: #f7f9fc; --card: #fff; --border: #e5e9f2;
      --ok: #137a3b; --err: #c03;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: var(--ink); background: var(--bg); line-height: 1.55;
    }
    .nav {
      max-width: 720px; margin: 0 auto; padding: 22px 24px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .brand { font-weight: 700; font-size: 18px; }
    .progress { color: var(--muted); font-size: 13px; }
    .dots { display: flex; gap: 6px; align-items: center; margin-left: 8px; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--border); display: inline-block;
    }
    .dot.done { background: var(--accent); }
    .dot.now { background: var(--accent); transform: scale(1.4); }

    .wrap { max-width: 720px; margin: 12px auto 80px; padding: 0 24px; }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 26px; margin-bottom: 16px;
    }
    .difficulty {
      display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 8px;
      border-radius: 999px; background: #eaf0fb; color: var(--accent); letter-spacing: 0.04em;
    }
    .prompt { font-size: 16px; line-height: 1.6; margin: 14px 0 22px; white-space: pre-wrap; }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option {
      text-align: left; padding: 14px 16px; border: 1px solid var(--border);
      background: white; border-radius: 8px; cursor: pointer; font: inherit; color: inherit;
      transition: background 0.05s, border-color 0.05s;
    }
    .option:hover { background: #f0f4fb; }
    .option:disabled { cursor: default; }
    .option.selected { border-color: var(--accent); background: #eaf0fb; }
    .option.correct { border-color: var(--ok); background: #e8f5ec; }
    .option.wrong   { border-color: var(--err); background: #fcecec; }

    .actions { display: flex; justify-content: space-between; align-items: center; margin-top: 18px; }
    .btn {
      padding: 11px 22px; border-radius: 8px; border: 1px solid transparent;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:disabled { background: #aab; cursor: not-allowed; }
    .feedback { font-size: 14px; }
    .feedback.ok { color: var(--ok); }
    .feedback.err { color: var(--err); }

    .explain {
      margin-top: 16px; padding: 14px 16px; background: #f5f7fc;
      border-left: 3px solid var(--accent); font-size: 14px; color: var(--muted);
    }

    /* Result screen */
    .result-card { text-align: center; padding: 36px 28px; }
    .result-score {
      font-size: 56px; font-weight: 700; letter-spacing: -0.02em; margin: 8px 0;
      color: var(--accent);
    }
    .result-sub { color: var(--muted); margin: 0 0 18px; font-size: 14px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="brand">Concourse</div>
    <div class="progress">
      <span id="prog-text">Calibration · verbal</span>
      <span class="dots" id="dots"></span>
    </div>
  </nav>

  <main class="wrap">
    <!-- Question card -->
    <div class="card" id="q-card">
      <div><span class="difficulty" id="q-diff">DIFFICULTY 2</span></div>
      <div class="prompt" id="q-prompt">Loading…</div>
      <div class="options" id="q-options"></div>
      <div class="explain hidden" id="q-explain"></div>
      <div class="actions">
        <div class="feedback" id="q-feedback"></div>
        <button class="btn btn-primary" id="next-btn" disabled>Submit</button>
      </div>
    </div>

    <!-- Result card -->
    <div class="card result-card hidden" id="r-card">
      <div class="result-sub">Verbal calibration complete</div>
      <div class="result-score" id="r-score">—</div>
      <div class="result-sub" id="r-detail">—</div>
      <div style="margin-top: 24px;">
        <a class="btn btn-primary" href="/me" style="text-decoration: none;">Back to dashboard</a>
      </div>
    </div>
  </main>

  <script>
    var TARGET = 5;
    var sessionId = null;
    var currentItem = null;
    var selectedIndex = null;
    var answered = 0;
    var awaitingNext = false;
    var startedAt = 0;

    var qCard   = document.getElementById('q-card');
    var rCard   = document.getElementById('r-card');
    var qDiff   = document.getElementById('q-diff');
    var qPrompt = document.getElementById('q-prompt');
    var qOpts   = document.getElementById('q-options');
    var qExp    = document.getElementById('q-explain');
    var qFb     = document.getElementById('q-feedback');
    var nextBtn = document.getElementById('next-btn');
    var dotsEl  = document.getElementById('dots');

    function renderDots() {
      dotsEl.innerHTML = '';
      for (var i = 0; i < TARGET; i++) {
        var d = document.createElement('span');
        d.className = 'dot' + (i < answered ? ' done' : (i === answered ? ' now' : ''));
        dotsEl.appendChild(d);
      }
    }

    function renderItem(item) {
      currentItem = item;
      selectedIndex = null;
      awaitingNext = false;
      qDiff.textContent = 'DIFFICULTY ' + item.difficulty;
      qPrompt.textContent = item.prompt;
      qExp.classList.add('hidden');
      qFb.textContent = '';
      nextBtn.textContent = 'Submit';
      nextBtn.disabled = true;
      qOpts.innerHTML = '';
      (item.options || []).forEach(function (opt, idx) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'option';
        btn.textContent = opt;
        btn.addEventListener('click', function () {
          if (awaitingNext) return;
          Array.prototype.forEach.call(qOpts.children, function (c) { c.classList.remove('selected'); });
          btn.classList.add('selected');
          selectedIndex = idx;
          nextBtn.disabled = false;
        });
        qOpts.appendChild(btn);
      });
      renderDots();
      startedAt = performance.now();
    }

    function lockOptions(correctIndex) {
      Array.prototype.forEach.call(qOpts.children, function (c, idx) {
        c.disabled = true;
        c.classList.remove('selected');
        if (idx === correctIndex) c.classList.add('correct');
        else if (idx === selectedIndex) c.classList.add('wrong');
      });
    }

    function showFinal(final) {
      qCard.classList.add('hidden');
      rCard.classList.remove('hidden');
      document.getElementById('r-score').textContent = (final.score || 0).toFixed(0);
      document.getElementById('r-detail').textContent =
        final.items_answered + ' items answered' +
        (final.median_time_ms ? ' · median ' + Math.round(final.median_time_ms / 1000) + 's per item' : '');
      // update progress bar to all dots done
      answered = TARGET;
      renderDots();
    }

    nextBtn.addEventListener('click', async function () {
      if (awaitingNext) {
        // user is moving on to the next item
        awaitingNext = false;
        if (window.__pendingNext) {
          renderItem(window.__pendingNext);
          window.__pendingNext = null;
        } else if (window.__pendingFinal) {
          showFinal(window.__pendingFinal);
          window.__pendingFinal = null;
        }
        return;
      }
      if (selectedIndex === null) return;
      nextBtn.disabled = true;
      nextBtn.textContent = 'Checking…';
      try {
        var elapsed = Math.round(performance.now() - startedAt);
        var r = await fetch('/api/diagnostic/answer', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            session_id: sessionId,
            item_id: currentItem.item_id,
            selected_index: selectedIndex,
            time_taken_ms: elapsed,
          }),
        });
        if (r.status === 401) { window.location.replace('/'); return; }
        if (!r.ok) throw new Error(await r.text());
        var data = await r.json();

        // show feedback
        var fb = data.feedback || {};
        lockOptions(fb.correct_index);
        qFb.className = 'feedback ' + (fb.is_correct ? 'ok' : 'err');
        qFb.textContent = fb.is_correct ? 'Correct.' : 'Not quite.';
        if (fb.explanation) {
          qExp.classList.remove('hidden');
          qExp.textContent = fb.explanation;
        }
        answered += 1;
        renderDots();

        if (data.done) {
          window.__pendingFinal = data.final;
          nextBtn.textContent = 'See result';
        } else {
          window.__pendingNext = data.next_item;
          nextBtn.textContent = 'Next question';
        }
        awaitingNext = true;
        nextBtn.disabled = false;
      } catch (e) {
        qFb.className = 'feedback err';
        qFb.textContent = 'Could not submit: ' + e.message;
        nextBtn.disabled = false;
        nextBtn.textContent = 'Submit';
      }
    });

    (async function start() {
      try {
        var r = await fetch('/api/diagnostic/start', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({skill_id: 'verbal', kind: 'periodic'}),
        });
        if (r.status === 401) { window.location.replace('/'); return; }
        if (!r.ok) throw new Error(await r.text());
        var data = await r.json();
        sessionId = data.session_id;
        renderItem(data.item);
      } catch (e) {
        qPrompt.textContent = 'Could not start the calibration. ' + e.message;
        qOpts.innerHTML = '';
      }
    })();
  </script>
</body>
</html>
